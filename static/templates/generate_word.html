{% extends 'layout.html' %}
{% block title %}Генерація документа{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-file-earmark-word"></i> Генерація документа</h2>
<form method="POST">
    <div class="mb-3">
        <label class="form-label">Оберіть шаблон</label>
        <select name="template" class="form-select">
        {% for tpl in available_templates %}
            {% if 'adddiplom' in tpl.lower() and session.get('role') != 'admin' %}
                {# ховаємо адмінський шаблон для не-адмінів #}
            {% else %}
                <option value="{{ tpl }}">
                    {% if 'adddiplom1' in tpl.lower() %}
                        Шаблон для додатку до диплому
                    {% elif 'tck1' in tpl.lower() %}
                        Повідомлення про зміну облікових даних в ТЦК
                    {% else %}
                        {{ tpl.split('/')[-1] }}
                    {% endif %}
                </option>
            {% endif %}
        {% endfor %}
        </select>
    </div>

    {% if session.get('role') == 'admin' %}
        <b>
            <label class="form-label">Якщо в назві файлу є - `adddiplom` - тільки юзер з правами адміна побачить.</label></br>
        <b>
            <label class="form-label">УВАГА!!! Перевірити місяць закінчення навчання в шаблоні додатку в трьох місцях!</label></br>
        </b>
    {% endif %}

    <button type="submit" class="btn btn-success">Створити документ</button>
    <a href="{{ url_for('students.student_list') }}" class="btn btn-secondary">Назад</a>
</form>
{% endblock %}
