{% extends 'layout.html' %}
{% import '_macros.html' as ui %}
{% block title %}Генерація документа{% endblock %}
{% block content %}
<div class="container py-4" style="max-width: 680px;">

    {{ ui.page_header('bi-file-earmark-word-fill', 'Генерація документа', 'Створення .docx-документа за обраним шаблоном') }}

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Оберіть шаблон</label>
                    <select name="template" class="form-select" id="templateSelect">
                    {% for tpl in available_templates %}
                        <option value="{{ tpl.path }}" data-description="{{ tpl.description }}">
                            {{ tpl.display_name }}{% if tpl.admin_only %} 🔒{% endif %}
                        </option>
                    {% endfor %}
                    </select>
                    <div class="form-text" id="templateDescription"></div>
                </div>

                <script>
                    (function () {
                        const select = document.getElementById('templateSelect');
                        const desc = document.getElementById('templateDescription');
                        function updateDescription() {
                            const opt = select.options[select.selectedIndex];
                            desc.textContent = opt ? (opt.dataset.description || '') : '';
                        }
                        select.addEventListener('change', updateDescription);
                        updateDescription();
                    })();
                </script>

                <button type="submit" class="btn btn-primary"><i class="bi bi-file-earmark-arrow-down me-2"></i>Створити документ</button>
                <a href="{{ url_for('students.student_list') }}" class="btn btn-outline-secondary">Назад</a>
            </form>
        </div>
    </div>

</div>
{% endblock %}
