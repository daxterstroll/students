{% extends 'layout.html' %}
{% import '_macros.html' as ui %}
{% block title %}Редагувати студента{% endblock %}
{% block content %}
<div class="container py-4">

    {{ ui.page_header('bi-pencil-square', 'Редагувати дані студента', student.last_name_UA ~ ' ' ~ student.first_name_UA) }}

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Прізвище (укр)</label>
                        <input type="text" name="last_name_UA" class="form-control" value="{{ student.last_name_UA or '' }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Ім'я (укр)</label>
                        <input type="text" name="first_name_UA" class="form-control" value="{{ student.first_name_UA or '' }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">По батькові</label>
                        <input type="text" name="middle_name_UA" class="form-control" value="{{ student.middle_name_UA or '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Прізвище (англ)</label>
                        <input type="text" name="last_name_ENG" class="form-control" value="{{ student.last_name_ENG or '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ім'я (англ)</label>
                        <input type="text" name="first_name_ENG" class="form-control" value="{{ student.first_name_ENG or '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Код картки фізичної особи в ЄДЕБО</label>
                        <input type="text" name="edebo_code" class="form-control" value="{{ student.edebo_code or '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Дата народження</label>
                        <input type="text" name="birth_date" class="form-control" placeholder="ДД.ММ.РРРР" value="{{ student.birth_date or '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Група</label>
                        <select name="group_id" class="form-select">
                            {% for group in groups|default([]) %}
                                <option value="{{ group.id }}"
                                    {% if group.id == student.group_id %}selected{% endif %}>
                                    {{ group.display_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12 d-flex flex-wrap gap-2 pt-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i>Зберегти зміни</button>
                        <button type="submit" name="update_english_names" value="1" class="btn btn-outline-secondary"><i class="bi bi-translate me-2"></i>Оновити англійські імена</button>
                        <a href="{{ url_for('students.student_list') }}" class="btn btn-outline-secondary">Назад</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock %}
