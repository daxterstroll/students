{% extends 'layout.html' %}
{% import '_macros.html' as ui %}
{% block title %}Редагувати користувача{% endblock %}
{% block content %}
<div class="container py-4">

    {{ ui.page_header('bi-person-gear', 'Редагувати користувача', user.username) }}

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="role" class="form-label">Роль</label>
                        <select name="role" id="role" class="form-select" required>
                            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Адміністратор</option>
                            <option value="user" {% if user.role == 'user' %}selected{% endif %}>Працівник</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="group_id" class="form-label">Групи (оберіть декілька)</label>
                        <select name="group_id" id="group_id" class="form-select" multiple>
                            {% for group in groups|default([]) %}
                                <option value="{{ group.id }}" {% if group.id in current_group_ids %}selected{% endif %}>{{ group.display_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i>Зберегти</button>
                        <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline-secondary">Назад</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock %}
