{% extends 'layout.html' %}
{% import '_macros.html' as ui %}
{% block title %}Зміна паролю{% endblock %}
{% block content %}
<div class="container py-4" style="max-width: 560px;">

    {{ ui.page_header('bi-key-fill', 'Зміна паролю', username) }}

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Новий пароль</label>
                    <input name="password" type="password" class="form-control" minlength="6" required>
                    <div class="form-text">Не менше 6 символів.</div>
                </div>
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i>Оновити пароль</button>
                <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Назад</a>
            </form>
        </div>
    </div>

</div>
{% endblock %}
