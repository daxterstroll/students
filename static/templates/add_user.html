{% extends 'layout.html' %}
{% import '_macros.html' as ui %}
{% block title %}Додати користувача{% endblock %}
{% block content %}
<div class="container py-4">

    {{ ui.page_header('bi-person-plus-fill', 'Додати користувача', 'Створення нового облікового запису') }}

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="username" class="form-label">Ім'я користувача</label>
                        <input type="text" name="username" id="username" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" name="password" id="password" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label for="role" class="form-label">Роль</label>
                        <select name="role" id="role" class="form-select" required>
                            <option value="admin">Адміністратор</option>
                            <option value="user">Працівник</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="group_id" class="form-label">Групи (оберіть декілька)</label>
                        <select name="group_id" id="group_id" class="form-select" multiple>
                            {% for group in groups|default([]) %}
                                <option value="{{ group.id }}">{{ group.display_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Додати</button>
                        <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline-secondary">Назад</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock %}
